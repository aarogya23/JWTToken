<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Commune</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <style>
    /* ═══════════════════════════
       DESIGN TOKENS
    ═══════════════════════════ */
    :root {
      --bg:          #f5f4f0;
      --white:       #ffffff;
      --surf2:       #f8f7f4;
      --border:      #e8e6e0;
      --border-md:   #d4d1c9;
      --text:        #1a1916;
      --text2:       #6b6860;
      --text3:       #a8a69f;
      --accent:      #2563eb;
      --accent-lt:   #eff4ff;
      --accent-h:    #1d4ed8;
      --red:         #e53e3e;
      --red-lt:      #fff5f5;
      --r:           12px;
      --r-sm:        8px;
      --sh-sm:       0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
      --sh-lg:       0 20px 48px rgba(0,0,0,.13),0 4px 16px rgba(0,0,0,.06);
      --topbar-h:    58px;
      --botbar-h:    60px; /* mobile bottom nav */
    }

    /* ═══════════════════════════
       RESET & BASE
    ═══════════════════════════ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { height:100%; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      /* space for mobile bottom nav */
      padding-bottom: 0;
    }
    body.mobile-nav-active { padding-bottom: var(--botbar-h); }
    button { font-family: inherit; }
    img, video { max-width:100%; display:block; }

    /* ═══════════════════════════
       TOPBAR
    ═══════════════════════════ */
    .topbar {
      position: sticky; top: 0; z-index: 300;
      height: var(--topbar-h);
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px; gap: 12px;
    }
    .brand {
      font-family: 'Fraunces', serif;
      font-size: 21px; font-weight: 600;
      color: var(--text); letter-spacing: -.5px;
      flex-shrink: 0;
    }
    .brand span { color: var(--accent); }
    .topbar-space { flex: 1; }
    .topbar-right { display: flex; gap: 8px; align-items: center; }

    /* hamburger – only mobile */
    .ham-btn {
      display: none;
      width: 36px; height: 36px; border-radius: var(--r-sm);
      background: var(--surf2); border: 1.5px solid var(--border);
      color: var(--text2); font-size: 18px; cursor: pointer;
      align-items: center; justify-content: center; flex-shrink: 0;
    }

    .tb-btn {
      height: 34px; padding: 0 14px; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all .18s; display: flex; align-items: center; gap: 6px;
      border: 1.5px solid var(--border); background: var(--white); color: var(--text2);
      white-space: nowrap;
    }
    .tb-btn:hover { border-color: var(--border-md); color: var(--text); background: var(--surf2); }
    .tb-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .tb-btn.primary:hover { background: var(--accent-h); }
    .tb-btn.ghost-red { color: var(--red); border-color: transparent; }
    .tb-btn.ghost-red:hover { background: var(--red-lt); border-color: #fecaca; }

    /* hide some topbar buttons on small mobile – replaced by bottom nav */
    .tb-hide-xs { }

    .tb-av {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--accent-lt);
      cursor: pointer; transition: border-color .18s;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--accent);
      background-size: cover; background-position: center;
      background-repeat: no-repeat; flex-shrink: 0; overflow: hidden;
    }
    .tb-av:hover { border-color: var(--accent); }

    /* ═══════════════════════════
       LAYOUT (desktop 3-col → mobile 1-col)
    ═══════════════════════════ */
    .layout {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 16px;
      display: flex; gap: 20px;
      align-items: flex-start;
    }
    .sidebar {
      width: 252px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 14px;
      position: sticky; top: calc(var(--topbar-h) + 10px);
    }
    .feed { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 14px; }

    /* ═══════════════════════════
       MOBILE SIDEBAR DRAWER
    ═══════════════════════════ */
    .drawer-backdrop {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,.35); backdrop-filter: blur(2px);
    }
    .drawer-backdrop.on { display: block; }
    .sidebar-drawer {
      /* desktop: just the normal sidebar */
    }

    /* ═══════════════════════════
       CARDS
    ═══════════════════════════ */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--sh-sm);
      overflow: hidden;
    }

    /* ═══════════════════════════
       SIDEBAR PROFILE
    ═══════════════════════════ */
    .ps { padding: 20px 18px 18px; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .ps-av-wrap { position: relative; margin-bottom: 14px; cursor: pointer; }
    .ps-av {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--accent-lt);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--accent);
      border: 3px solid var(--border);
      background-size: cover; background-position: center; background-repeat: no-repeat;
      overflow: hidden; transition: border-color .18s;
    }
    .ps-av-wrap:hover .ps-av { border-color: var(--accent); }
    .ps-av-badge {
      position: absolute; bottom: 0; right: 0;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; border: 2px solid var(--white);
    }
    .ps-name { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; margin-bottom: 3px; }
    .ps-email { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
    .ps-bio { font-size: 13px; color: var(--text2); font-style: italic; line-height: 1.5; margin-bottom: 14px; }
    .ps-edit {
      width: 100%; padding: 8px; border-radius: var(--r-sm);
      border: 1.5px solid var(--border); background: var(--surf2); color: var(--text2);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .18s;
    }
    .ps-edit:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

    /* sidebar groups */
    .sg-head { padding: 14px 16px 10px; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid var(--border); }
    .sg-body { padding: 6px 8px; }
    .sg-row { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--r-sm); cursor: pointer; transition: background .15s; }
    .sg-row:hover { background: var(--surf2); }
    .sg-icon { width: 32px; height: 32px; border-radius: var(--r-sm); background: var(--accent-lt); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .sg-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sg-btn { font-size: 11px; font-weight: 600; color: var(--accent); padding: 3px 8px; border-radius: 10px; background: var(--accent-lt); border: none; cursor: pointer; transition: background .15s; }
    .sg-btn:hover { background: #dbeafe; }

    /* ═══════════════════════════
       STORIES ROW
    ═══════════════════════════ */
    .stories-wrap {
      padding: 14px 16px;
      display: flex; gap: 12px;
      overflow-x: auto; scrollbar-width: none;
    }
    .stories-wrap::-webkit-scrollbar { display: none; }
    .story-bbl { flex-shrink: 0; width: 68px; text-align: center; cursor: pointer; }
    .story-ring {
      width: 58px; height: 58px; border-radius: 50%;
      margin: 0 auto 6px; padding: 2.5px;
      background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
      transition: transform .2s;
    }
    .story-bbl:hover .story-ring { transform: scale(1.07); }
    .story-ring.add { background: none; border: 2px dashed var(--border-md); }
    .story-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: var(--white); border: 2.5px solid var(--white);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
      background-size: cover; background-position: center;
      background-repeat: no-repeat; overflow: hidden;
    }
    .story-ring.add .story-inner { background: var(--surf2); color: var(--text3); font-size: 22px; border: none; }
    .story-lbl { font-size: 11px; color: var(--text2); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ═══════════════════════════
       COMPOSE BOX
    ═══════════════════════════ */
    .compose-top { padding: 12px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .c-av {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--accent-lt); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--accent); flex-shrink: 0;
      background-size: cover; background-position: center; background-repeat: no-repeat; overflow: hidden;
    }
    .compose-pill {
      flex: 1; padding: 9px 16px;
      background: var(--surf2); border: 1.5px solid var(--border); border-radius: 20px;
      font-size: 14px; color: var(--text3); cursor: default; user-select: none;
    }
    .compose-btns { display: flex; gap: 8px; padding: 10px 14px; }
    .c-btn {
      flex: 1; padding: 9px 10px;
      border: 1.5px solid var(--border); border-radius: var(--r-sm);
      background: var(--white); color: var(--text2);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all .18s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .c-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

    /* ═══════════════════════════
       TABS
    ═══════════════════════════ */
    .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 6px; }
    .tab {
      padding: 11px 14px; border: none; background: none;
      font-size: 13px; font-weight: 600; color: var(--text3);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .tab.on { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.on) { color: var(--text2); }

    /* ═══════════════════════════
       FEED ITEMS
    ═══════════════════════════ */
    .fi { border-bottom: 1px solid var(--border); animation: slideUp .25s ease both; }
    .fi:last-child { border-bottom: none; }
    @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fi-head { padding: 13px 16px 9px; display: flex; align-items: center; gap: 12px; }
    .fi-av {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; flex-shrink: 0;
      background-size: cover; background-position: center; background-repeat: no-repeat; overflow: hidden;
    }
    .fi-meta { flex: 1; min-width: 0; }
    .fi-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fi-sub { font-size: 12px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
    .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
    .badge-g { background: #eff6ff; color: #2563eb; }
    .badge-s { background: #fdf4ff; color: #9333ea; }
    .fi-body { padding: 2px 16px 13px; }
    .fi-desc { font-size: 14px; color: var(--text2); line-height: 1.55; margin-bottom: 11px; }
    .fi-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .fi-btn {
      flex: 1; min-width: 100px; padding: 8px 10px;
      border: 1.5px solid var(--border); border-radius: var(--r-sm);
      background: var(--white); color: var(--text2);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all .18s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .fi-btn.open:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
    .fi-btn.del:hover { border-color: #fecaca; color: var(--red); background: var(--red-lt); }

    /* empty */
    .empty { padding: 44px 20px; text-align: center; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .35; }
    .empty-title { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
    .empty-sub { font-size: 13px; color: var(--text3); }

    /* ═══════════════════════════
       MODALS
    ═══════════════════════════ */
    .ovl {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(15,15,12,.45); backdrop-filter: blur(4px);
      align-items: flex-end; justify-content: center; /* bottom sheet on mobile */
      padding: 0;
    }
    .ovl.on { display: flex; }
    .modal {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r) var(--r) 0 0; /* bottom sheet */
      box-shadow: var(--sh-lg);
      width: 100%; max-width: 100%;
      max-height: 92vh; overflow-y: auto;
      animation: sheetUp .22s cubic-bezier(.34,1.4,.64,1) both;
    }
    @keyframes sheetUp { from { transform: translateY(60px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .modal-head {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--white); z-index: 1;
    }
    /* drag handle */
    .modal-head::before {
      content: '';
      display: block;
      width: 36px; height: 4px;
      background: var(--border-md);
      border-radius: 2px;
      position: absolute;
      top: 8px; left: 50%; transform: translateX(-50%);
    }
    .modal-title { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; color: var(--text); }
    .modal-x {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--surf2); border: 1.5px solid var(--border);
      color: var(--text3); font-size: 16px; cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-x:hover { background: var(--border); color: var(--text); }
    .modal-body { padding: 18px; }
    .modal-foot {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
      background: var(--surf2);
      /* safe area for iPhone */
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    }

    /* FORM */
    .fg { margin-bottom: 15px; }
    .fg:last-child { margin-bottom: 0; }
    .fl { display: block; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .fi-inp, .fi-ta {
      width: 100%; padding: 10px 12px;
      background: var(--surf2); border: 1.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 14px; color: var(--text); transition: border-color .18s, background .18s;
      font-family: inherit;
    }
    .fi-inp:focus, .fi-ta:focus { outline: none; border-color: var(--accent); background: var(--white); }
    .fi-inp::placeholder, .fi-ta::placeholder { color: var(--text3); }
    .fi-inp:disabled { opacity: .5; cursor: not-allowed; }
    .fi-ta { resize: vertical; min-height: 80px; }

    /* profile img in modal */
    .pm-img-wrap { text-align: center; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
    .pm-img {
      width: 76px; height: 76px; border-radius: 50%;
      margin: 0 auto 10px;
      background: var(--accent-lt); border: 3px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--accent);
      cursor: pointer; transition: border-color .18s;
      background-size: cover; background-position: center; background-repeat: no-repeat; overflow: hidden;
    }
    .pm-img:hover { border-color: var(--accent); }
    #pmImgInput { display: none; }
    .pm-hint { font-size: 11px; color: var(--text3); }

    /* file drop */
    .fdrop {
      border: 2px dashed var(--border-md); border-radius: var(--r-sm);
      padding: 20px 14px; text-align: center;
      cursor: pointer; transition: all .18s; position: relative;
    }
    .fdrop:hover { border-color: var(--accent); background: var(--accent-lt); }
    .fdrop input { display: none; }
    .fdrop-icon { font-size: 26px; margin-bottom: 6px; }
    .fdrop-text { font-size: 13px; color: var(--text2); font-weight: 500; }
    .fdrop-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
    .fprev { margin-top: 12px; border-radius: var(--r-sm); overflow: hidden; border: 1px solid var(--border); background: var(--surf2); }
    .fprev img, .fprev video { width: 100%; max-height: 220px; object-fit: cover; }
    .fprev audio { width: 100%; padding: 10px; }

    /* buttons */
    .btn { padding: 10px 20px; border-radius: var(--r-sm); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .18s; border: none; font-family: inherit; }
    .btn-ghost { background: var(--white); color: var(--text2); border: 1.5px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-md); color: var(--text); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); transform: translateY(-1px); }
    .btn-primary:disabled { background: var(--text3); transform: none; cursor: not-allowed; }

    /* ═══════════════════════════
       CHAT
    ═══════════════════════════ */
    .chat-ovl {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: rgba(15,15,12,.45); backdrop-filter: blur(4px);
      align-items: flex-end; justify-content: center;
    }
    .chat-ovl.on { display: flex; }
    .chat-box {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--r) var(--r) 0 0;
      box-shadow: var(--sh-lg);
      width: 100%; max-width: 100%;
      height: 90vh;
      display: flex; flex-direction: column;
      animation: sheetUp .22s cubic-bezier(.34,1.4,.64,1) both;
    }
    .chat-head {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; background: var(--white);
      position: relative;
    }
    /* drag handle */
    .chat-head::before {
      content: '';
      display: block;
      width: 36px; height: 4px;
      background: var(--border-md); border-radius: 2px;
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    }
    .chat-head-av { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-lt); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--accent); font-weight: 700; flex-shrink: 0; }
    .chat-head-title { flex: 1; font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-x {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--surf2); border: 1.5px solid var(--border);
      color: var(--text3); font-size: 16px; cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .chat-x:hover { background: var(--border); color: var(--text); }
    .chat-msgs {
      flex: 1; overflow-y: auto; padding: 14px;
      background: var(--bg); display: flex; flex-direction: column; gap: 10px;
    }
    .chat-msgs::-webkit-scrollbar { width: 4px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }
    .no-msg { text-align: center; color: var(--text3); font-size: 13px; padding: 24px; }
    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.own { flex-direction: row-reverse; }
    .msg-av {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      background-size: cover; background-position: center; overflow: hidden;
    }
    .msg-bbl { max-width: 72%; padding: 9px 12px; border-radius: 14px; font-size: 14px; line-height: 1.45; }
    .msg-row.other .msg-bbl { background: var(--white); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg-row.own .msg-bbl { color: #fff; border-bottom-right-radius: 4px; }
    .msg-who { font-size: 11px; font-weight: 700; margin-bottom: 3px; opacity: .7; }
    .msg-ts { font-size: 10px; margin-top: 4px; opacity: .55; }
    .msg-media { margin-top: 8px; }
    .msg-media img, .msg-media video { max-width: 200px; border-radius: var(--r-sm); }
    .msg-media audio { max-width: 220px; }
    .chat-foot {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center; background: var(--white);
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    }
    .chat-att {
      width: 36px; height: 36px; border-radius: var(--r-sm);
      background: var(--surf2); border: 1.5px solid var(--border);
      color: var(--text2); font-size: 16px; cursor: pointer;
      transition: all .15s; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .chat-att:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
    .chat-in {
      flex: 1; padding: 9px 14px;
      background: var(--surf2); border: 1.5px solid var(--border); border-radius: 20px;
      color: var(--text); font-size: 14px; transition: border-color .18s; font-family: inherit;
    }
    .chat-in:focus { outline: none; border-color: var(--accent); background: var(--white); }
    .chat-in::placeholder { color: var(--text3); }
    .chat-send {
      width: 36px; height: 36px; border-radius: var(--r-sm);
      background: var(--accent); border: none; color: #fff; font-size: 16px;
      cursor: pointer; transition: all .18s;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .chat-send:hover { background: var(--accent-h); transform: scale(1.05); }

    /* ═══════════════════════════
       STORY VIEWER (fullscreen)
    ═══════════════════════════ */
    .sv {
      display: none; position: fixed; inset: 0; z-index: 900;
      background: #0a0a0a;
    }
    .sv.on { display: block; }
    .sv-bars {
      position: absolute; top: 0; left: 0; right: 0; z-index: 5;
      display: flex; gap: 3px;
      padding: 12px 12px 6px;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
      background: linear-gradient(to bottom, rgba(0,0,0,.55), transparent);
    }
    .sv-bar { flex: 1; height: 2.5px; border-radius: 2px; background: rgba(255,255,255,.28); overflow: hidden; }
    .sv-bar-fill { height: 100%; background: #fff; width: 0; }
    .sv-bar.past .sv-bar-fill { width: 100%; }
    .sv-bar.now .sv-bar-fill { animation: svfill var(--sv-t, 5000ms) linear forwards; }
    @keyframes svfill { from { width:0; } to { width:100%; } }

    .sv-top {
      position: absolute; top: 30px; left: 0; right: 0; z-index: 5;
      padding: 10px 14px;
      padding-top: calc(10px + env(safe-area-inset-top, 0px));
      display: flex; align-items: center; gap: 10px;
    }
    .sv-uav {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.5);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 14px; font-weight: 600; color: #fff;
      background-size: cover; background-position: center; overflow: hidden; flex-shrink: 0;
    }
    .sv-uname { color: #fff; font-weight: 700; font-size: 14px; }
    .sv-utime { color: rgba(255,255,255,.65); font-size: 11px; }
    .sv-x {
      margin-left: auto; width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,.15); border: none; color: #fff; font-size: 18px;
      cursor: pointer; transition: background .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .sv-x:hover { background: rgba(255,255,255,.28); }
    .sv-media {
      position: absolute; inset: 0; z-index: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .sv-media img, .sv-media video { max-width: 100%; max-height: 100%; object-fit: contain; }
    .sv-media audio { width: 80%; max-width: 340px; }
    .sv-cap {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 5;
      padding: 40px 18px 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(to top, rgba(0,0,0,.72), transparent);
      color: #fff; font-size: 14px; line-height: 1.55;
    }
    /* tap zones for story navigation */
    .sv-tap-prev, .sv-tap-next {
      position: absolute; top: 0; bottom: 0; z-index: 4;
      width: 35%; cursor: pointer; background: transparent;
      border: none;
    }
    .sv-tap-prev { left: 0; }
    .sv-tap-next { right: 0; }
    /* arrow buttons for desktop */
    .sv-arr {
      position: absolute; top: 50%; transform: translateY(-50%);
      z-index: 6; background: none; border: none;
      color: rgba(255,255,255,.65); font-size: 28px; cursor: pointer;
      padding: 16px 10px; transition: color .18s;
    }
    .sv-arr:hover { color: #fff; }
    .sv-arr.prev { left: 0; }
    .sv-arr.next { right: 0; }

    /* ═══════════════════════════
       MOBILE BOTTOM NAV
    ═══════════════════════════ */
    .bot-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 250;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      height: var(--botbar-h);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .bot-nav-inner {
      display: flex; align-items: stretch;
      height: 100%; padding: 0 4px;
    }
    .bn-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      border: none; background: none; cursor: pointer;
      color: var(--text3); font-size: 10px; font-weight: 600;
      transition: color .18s; border-radius: var(--r-sm);
      padding: 6px 4px;
    }
    .bn-item.on { color: var(--accent); }
    .bn-item:active { background: var(--surf2); }
    .bn-icon { font-size: 20px; line-height: 1; }
    .bn-label { font-size: 10px; font-weight: 600; }

    /* ═══════════════════════════
       MOBILE DRAWER SIDEBAR
    ═══════════════════════════ */
    .mob-drawer {
      display: none;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 450;
      width: min(300px, 85vw);
      background: var(--white);
      border-right: 1px solid var(--border);
      box-shadow: 4px 0 24px rgba(0,0,0,.12);
      overflow-y: auto;
      transform: translateX(-100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    .mob-drawer.on { transform: translateX(0); }
    .mob-drawer-head {
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding-top: calc(16px + env(safe-area-inset-top, 0px));
    }
    .mob-drawer-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; }
    .mob-drawer-x {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surf2); border: 1.5px solid var(--border);
      color: var(--text3); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .mob-drawer-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    /* ═══════════════════════════
       RESPONSIVE BREAKPOINTS
    ═══════════════════════════ */

    /* Tablet: 600–900px — hide sidebar, show ham, keep top actions */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .layout { padding: 16px 12px; }
    }

    /* Mobile: ≤640px — full bottom nav, compact everything */
    @media (max-width: 640px) {
      body.mobile-nav-active { padding-bottom: calc(var(--botbar-h) + env(safe-area-inset-bottom, 0px)); }

      .topbar { padding: 0 14px; height: 52px; }
      --topbar-h: 52px;
      .brand { font-size: 19px; }

      /* hide Story/Group buttons from topbar on mobile — in bottom nav instead */
      .tb-hide-xs { display: none !important; }

      .topbar-space { flex: 1; }

      .ham-btn { display: flex; }

      .bot-nav { display: block; }
      .mob-drawer { display: block; }

      .layout { padding: 12px 10px; }
      .card { border-radius: 10px; }

      /* stories row – bigger bubbles on mobile */
      .story-bbl { width: 62px; }
      .story-ring { width: 54px; height: 54px; }
      .story-inner { font-size: 13px; }

      .compose-pill { font-size: 13px; padding: 8px 14px; }
      .compose-btns { padding: 8px 10px; gap: 6px; }
      .c-btn { font-size: 12px; padding: 8px 8px; }

      .fi-btn { font-size: 12px; padding: 7px 8px; }

      /* chat – full screen on mobile */
      .chat-box { height: 100%; border-radius: 0; }
      .chat-ovl { align-items: stretch; }

      /* modal – near-fullscreen bottom sheet */
      .modal { max-height: 95vh; }

      /* story viewer nav arrows hidden on mobile (tap zones used instead) */
      .sv-arr { display: none; }
    }

    /* Very small: ≤360px */
    @media (max-width: 360px) {
      .story-bbl { width: 56px; }
      .story-ring { width: 50px; height: 50px; }
      .brand { font-size: 17px; }
      .fi-actions { flex-direction: column; }
      .fi-btn { flex: unset; width: 100%; }
      .bn-label { display: none; }
      .bn-icon { font-size: 22px; }
    }

    /* Desktop: wider modals (override bottom-sheet style) */
    @media (min-width: 641px) {
      .ovl {
        align-items: center;
        padding: 16px;
      }
      .modal {
        border-radius: var(--r);
        max-width: 480px;
        animation: popIn .2s cubic-bezier(.34,1.56,.64,1) both;
      }
      @keyframes popIn { from { opacity:0; transform:scale(.94); } to { opacity:1; transform:scale(1); } }
      .modal-head::before { display: none; }

      .chat-ovl { align-items: center; padding: 16px; }
      .chat-box {
        border-radius: var(--r);
        max-width: 560px; height: 82vh;
      }
      .chat-head::before { display: none; }

      .modal-foot { padding-bottom: 14px; }
      .chat-foot { padding-bottom: 10px; }
    }
  </style>
</head>

<!-- ══════════════════════════════

══════════════════════════════ -->
<script>
/* ── bootstrap token ── */
(()=>{
  const p=new URLSearchParams(location.search),t=p.get('token');
  if(t){localStorage.setItem('jwtToken',t);history.replaceState({},'',location.pathname);}
  if(!localStorage.getItem('jwtToken'))localStorage.setItem('jwtToken','demo');
})();

const tok=()=>localStorage.getItem('jwtToken');
const aH=()=>({'Authorization':'Bearer '+tok()});
const jH=()=>({...aH(),'Content-Type':'application/json'});

let me=null, groups=[], stories=[], tab='all';
let chatGid=null, stomp=null, pendingFile=null;
let svIdx=0, svTmr=null;
const SV_DUR=5000;
const pal=['#2563eb','#9333ea','#059669','#d97706','#dc2626','#0891b2','#7c3aed'];
const uColors={};
const uColor=n=>{if(!uColors[n])uColors[n]=pal[Object.keys(uColors).length%pal.length];return uColors[n];};

function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function ago(d){const s=Math.floor((Date.now()-new Date(d))/1000);return s<60?'just now':s<3600?Math.floor(s/60)+'m ago':s<86400?Math.floor(s/3600)+'h ago':Math.floor(s/86400)+'d ago';}

/* ── overlay / modal ── */
function openOvl(id){document.getElementById(id).classList.add('on');}
function closeOvl(id){document.getElementById(id).classList.remove('on');}
document.querySelectorAll('.ovl').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('on');});
});
document.getElementById('chatOvl').addEventListener('click',e=>{if(e.target===document.getElementById('chatOvl'))closeChat();});

/* ── mobile drawer ── */
function openDrawer(){
  document.getElementById('mobDrawer').classList.add('on');
  document.getElementById('drawerBackdrop').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeDrawer(){
  document.getElementById('mobDrawer').classList.remove('on');
  document.getElementById('drawerBackdrop').classList.remove('on');
  document.body.style.overflow='';
}

/* ── bottom nav ── */
function botNav(section){
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('on'));
  document.getElementById('bn-'+section)?.classList.add('on');
  if(section==='groups') setTab('groups');
  if(section==='home') setTab('all');
}

/* ── avatar helper ── */
function applyAv(el,img,name,fallBg){
  if(!el)return;
  const init=(name||'U').charAt(0).toUpperCase();
  if(img){
    el.style.background=`url('${img}') center/cover no-repeat`;
    el.textContent='';
    el.style.color='transparent';
  } else {
    el.style.background=fallBg||'var(--accent-lt)';
    el.textContent=init;
    el.style.color='var(--accent)';
  }
}

/* ── init ── */
function init(){
  fetch('/api/profile',{headers:aH()})
    .then(r=>r.json())
    .then(u=>{
      me=u; syncUI();
      document.getElementById('pmName').value=u.fullName||'';
      document.getElementById('pmEmail').value=u.email||'';
      document.getElementById('pmBio').value=u.bio||'';
    })
    .catch(()=>{me={id:1,fullName:'You',email:'you@example.com',bio:''};syncUI();});
  loadGroups();
  loadStories();
}

function syncUI(){
  if(!me)return;
  const img=me.profileImage, name=me.fullName||'U';
  applyAv(document.getElementById('topAv'),   img,name);
  applyAv(document.getElementById('psAv'),    img,name);
  applyAv(document.getElementById('composeAv'),img,name);
  applyAv(document.getElementById('pmImg'),   img,name);
  applyAv(document.getElementById('drawerAv'),img,name);

  ['psName','drawerName'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=name;});
  ['psEmail','drawerEmail'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=me.email||'';});

  const bioEl=document.getElementById('psBio');
  if(bioEl){if(me.bio){bioEl.textContent=me.bio;bioEl.style.display='block';}else{bioEl.style.display='none';}}
}

/* ── profile ── */
function onProfileImg(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{if(me){me.profileImage=ev.target.result;syncUI();}};
  r.readAsDataURL(file);
}
function saveProfile(){
  const fullName=document.getElementById('pmName').value.trim();
  const bio=document.getElementById('pmBio').value.trim();
  if(!fullName){alert('Name required');return;}
  fetch('/api/profile',{method:'PUT',headers:jH(),body:JSON.stringify({fullName,bio,profileImage:me?.profileImage||null})})
    .then(r=>r.json())
    .then(u=>{me=u;syncUI();closeOvl('profileOvl');})
    .catch(()=>{me={...me,fullName,bio};syncUI();closeOvl('profileOvl');});
}
function logout(){localStorage.removeItem('jwtToken');location.href='/login.html';}

/* ── groups ── */
function loadGroups(){
  fetch('/api/groups',{headers:aH()})
    .then(r=>r.json()).then(g=>{groups=g||[];renderFeed();renderSidebar();})
    .catch(()=>{groups=[];renderFeed();renderSidebar();});
}
function renderSidebar(){
  const empty='<div style="padding:10px 8px;font-size:12px;color:var(--text3)">No groups yet</div>';
  const html=!groups.length?empty:groups.map(g=>`
    <div class="sg-row">
      <div class="sg-icon">👥</div>
      <div class="sg-name">${esc(g.name)}</div>
      <button class="sg-btn" onclick="openChat(${g.id})">Chat</button>
    </div>`).join('');
  document.getElementById('sgList').innerHTML=html;
  document.getElementById('drawerGroupsList').innerHTML=html.replace(/openChat\(/g,'openChat(').replace(/onclick="openChat/g,'onclick="closeDrawer();openChat');
}
function createGroup(){
  const name=document.getElementById('gName').value.trim();
  const description=document.getElementById('gDesc').value.trim();
  if(!name){alert('Group name required');return;}
  fetch('/api/groups',{method:'POST',headers:jH(),body:JSON.stringify({name,description})})
    .then(r=>r.json())
    .then(()=>{closeOvl('groupOvl');document.getElementById('gName').value='';document.getElementById('gDesc').value='';loadGroups();})
    .catch(()=>alert('Failed to create group'));
}
function deleteGroup(id){
  if(!confirm('Delete this group?'))return;
  fetch('/api/groups/'+id,{method:'DELETE',headers:aH()}).then(()=>loadGroups()).catch(()=>alert('Failed'));
}

/* ── stories ── */
function loadStories(){
  fetch('/api/stories/all',{headers:aH()})
    .then(r=>r.json()).then(s=>{stories=s||[];renderFeed();renderStoriesRow();})
    .catch(()=>{stories=[];renderFeed();renderStoriesRow();});
}
function renderStoriesRow(){
  const row=document.getElementById('storiesRow');
  const addBtn=row.children[0];
  row.innerHTML='';row.appendChild(addBtn);
  stories.forEach((s,i)=>{
    const init=(s.userFullName||'U').charAt(0).toUpperCase();
    const ft=s.fileType||s.mediaType||'';
    const src=s.fileUrl||(s.mediaUrl&&ft?`data:${ft};base64,${s.mediaUrl}`:'');
    const isImg=ft.startsWith('image/')||/\.(jpg|jpeg|png|gif|webp|svg|bmp)(\?|$)/i.test(s.fileUrl||'');
    const d=document.createElement('div');
    d.className='story-bbl';d.onclick=()=>svOpen(i);
    let innerStyle='', innerContent='';
    if(isImg&&src){innerStyle=`background:url('${src}') center/cover no-repeat;`;}
    else{innerContent=`<span style="font-size:15px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5)">${init}</span>`;}
    d.innerHTML=`<div class="story-ring"><div class="story-inner" style="${innerStyle}">${innerContent}</div></div><div class="story-lbl">${esc(s.userFullName||'User')}</div>`;
    row.appendChild(d);
  });
}
function onStoryFile(e){
  const file=e.target.files[0];if(!file)return;
  const prev=document.getElementById('storyPrev');
  const reader=new FileReader();
  reader.onload=ev=>{
    if(file.type.startsWith('image/'))prev.innerHTML=`<img src="${ev.target.result}" alt="preview">`;
    else if(file.type.startsWith('video/'))prev.innerHTML=`<video controls><source src="${ev.target.result}" type="${file.type}"></video>`;
    else prev.innerHTML=`<audio controls><source src="${ev.target.result}" type="${file.type}"></audio>`;
    prev.style.display='block';
  };
  reader.readAsDataURL(file);
}
function createStory(){
  const fi=document.getElementById('storyFile');
  const caption=document.getElementById('storyCap').value.trim();
  if(!fi.files[0]){alert('Please select a file');return;}
  const fd=new FormData();fd.append('file',fi.files[0]);if(caption)fd.append('caption',caption);
  const btn=document.getElementById('storySaveBtn');btn.disabled=true;btn.textContent='Sharing…';
  fetch('/api/stories/upload',{method:'POST',headers:aH(),body:fd})
    .then(r=>r.json())
    .then(()=>{
      closeOvl('storyOvl');
      fi.value='';document.getElementById('storyCap').value='';document.getElementById('storyPrev').style.display='none';
      btn.disabled=false;btn.textContent='Share Story';
      loadStories();
    })
    .catch(()=>{alert('Failed');btn.disabled=false;btn.textContent='Share Story';});
}
function deleteStory(id){
  if(!confirm('Delete this story?'))return;
  fetch('/api/stories/'+id,{method:'DELETE',headers:aH()}).then(()=>loadStories()).catch(()=>alert('Failed'));
}

/* ── feed ── */
function setTab(t){
  tab=t;
  ['all','groups','stories'].forEach(x=>document.getElementById('t-'+x).classList.toggle('on',x===t));
  renderFeed();
}
function renderFeed(){
  const el=document.getElementById('feedList');
  let items=[];
  if(tab!=='stories')groups.forEach(g=>items.push({kind:'group',d:g}));
  if(tab!=='groups')stories.forEach((s,i)=>items.push({kind:'story',d:s,i}));
  if(!items.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Nothing here yet</div><div class="empty-sub">Create a group or share a story to get started</div></div>';
    return;
  }
  el.innerHTML='';
  items.forEach(({kind,d,i},idx)=>{
    const wrap=document.createElement('div');
    wrap.className='fi';wrap.style.animationDelay=(idx*.04)+'s';
    if(kind==='group'){
      wrap.innerHTML=`
        <div class="fi-head">
          <div class="fi-av" style="background:#eff6ff;color:#2563eb;font-size:18px">👥</div>
          <div class="fi-meta">
            <div class="fi-name">${esc(d.name)}</div>
            <div class="fi-sub"><span class="badge badge-g">Group</span></div>
          </div>
        </div>
        <div class="fi-body">
          <div class="fi-desc">${d.description?esc(d.description):'A chat group for messaging.'}</div>
          <div class="fi-actions">
            <button class="fi-btn open" onclick="openChat(${d.id})">💬 Open Chat</button>
            <button class="fi-btn del"  onclick="deleteGroup(${d.id})">🗑 Delete</button>
          </div>
        </div>`;
    } else {
      const init=(d.userFullName||'U').charAt(0).toUpperCase();
      const isOwn=d.userId===me?.id;
      let avStyle=`background:linear-gradient(135deg,#f97316,#ec4899);color:#fff`;
      let avContent=init;
      if(d.userProfileImage){avStyle=`background:url('${d.userProfileImage}') center/cover no-repeat`;avContent='';}
      wrap.innerHTML=`
        <div class="fi-head">
          <div class="fi-av" style="${avStyle}">${avContent}</div>
          <div class="fi-meta">
            <div class="fi-name">${esc(d.userFullName||'User')}</div>
            <div class="fi-sub"><span class="badge badge-s">Story</span> · ${ago(d.createdAt)}</div>
          </div>
        </div>
        <div class="fi-body">
          ${d.caption?`<div class="fi-desc">${esc(d.caption)}</div>`:''}
          <div class="fi-actions">
            <button class="fi-btn open" onclick="svOpen(${i})">👁 View Story</button>
            ${isOwn?`<button class="fi-btn del" onclick="deleteStory(${d.id})">🗑 Delete</button>`:''}
          </div>
        </div>`;
    }
    el.appendChild(wrap);
  });
}

/* ── chat ── */
function openChat(id){
  chatGid=id;
  const g=groups.find(x=>x.id===id);
  document.getElementById('chatTitle').textContent=g?.name||'Group Chat';
  document.getElementById('chatMsgs').innerHTML='<div class="no-msg">Loading messages…</div>';
  document.getElementById('chatOvl').classList.add('on');
  loadChatHistory();
  if(!stomp||!stomp.connected)connectWS();
}
function closeChat(){document.getElementById('chatOvl').classList.remove('on');chatGid=null;}
function connectWS(){
  const sock=new SockJS('/ws?token='+tok());
  stomp=Stomp.over(sock);
  stomp.connect({},()=>{
    if(chatGid)stomp.subscribe('/topic/group/'+chatGid,m=>appendMsg(JSON.parse(m.body)));
  },err=>{console.error(err);setTimeout(connectWS,5000);});
}
function loadChatHistory(){
  fetch('/api/chat/history?groupId='+chatGid,{headers:aH()})
    .then(r=>r.json())
    .then(msgs=>{
      const el=document.getElementById('chatMsgs');el.innerHTML='';
      if(!msgs.length){el.innerHTML='<div class="no-msg">No messages yet. Say hello!</div>';return;}
      msgs.forEach(appendMsg);
    })
    .catch(()=>{document.getElementById('chatMsgs').innerHTML='<div class="no-msg">Could not load messages.</div>';});
}
function appendMsg(msg){
  const el=document.getElementById('chatMsgs');
  if(el.querySelector('.no-msg'))el.innerHTML='';
  const own=msg.sender===me?.fullName;
  const color=uColor(msg.sender||'User');
  const init=(msg.sender||'U').charAt(0).toUpperCase();
  let mediaHtml='';
  if(msg.fileUrl){
    const ft=msg.fileType||'';
    if(ft.startsWith('image/'))mediaHtml=`<div class="msg-media"><img src="${msg.fileUrl}" alt="image"></div>`;
    else if(ft.startsWith('video/'))mediaHtml=`<div class="msg-media"><video controls width="200"><source src="${msg.fileUrl}" type="${ft}"></video></div>`;
    else if(ft.startsWith('audio/'))mediaHtml=`<div class="msg-media"><audio controls><source src="${msg.fileUrl}" type="${ft}"></audio></div>`;
    else mediaHtml=`<a href="${msg.fileUrl}" download="${esc(msg.fileName||'file')}" style="color:#2563eb;font-size:13px">📥 ${esc(msg.fileName||'Download')}</a>`;
  }
  const row=document.createElement('div');
  row.className='msg-row '+(own?'own':'other');
  row.innerHTML=`
    <div class="msg-av" style="background:${color}">${init}</div>
    <div class="msg-bbl" style="${own?'background:'+color:''}">
      ${!own?`<div class="msg-who" style="color:${color}">${esc(msg.sender||'User')}</div>`:''}
      <div>${esc(msg.content||'')}</div>
      ${mediaHtml}
      <div class="msg-ts">${new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
    </div>`;
  el.appendChild(row);el.scrollTop=el.scrollHeight;
}
function sendMsg(){
  const input=document.getElementById('chatIn');
  const content=input.value.trim();
  if((!content&&!pendingFile)||!stomp||!chatGid)return;
  const msg={content,sender:me?.fullName||'User',groupId:chatGid,timestamp:new Date().toISOString()};
  if(pendingFile){Object.assign(msg,pendingFile);pendingFile=null;document.getElementById('chatFile').value='';}
  stomp.send('/app/chat.sendMessage/'+chatGid,{},JSON.stringify(msg));
  input.value='';input.focus();
}
function onChatFile(e){
  const file=e.target.files[0];if(!file)return;
  const fd=new FormData();fd.append('file',file);
  fetch('/api/chat/upload',{method:'POST',headers:aH(),body:fd})
    .then(r=>r.json())
    .then(d=>{if(!d.error){pendingFile=d;alert('File ready: '+d.fileName);}else alert('Error: '+d.error);})
    .catch(()=>alert('Upload failed'));
}

/* ── story viewer ── */
function svOpen(idx){
  if(!stories.length)return;
  svIdx=idx;
  document.getElementById('svOvl').classList.add('on');
  document.body.style.overflow='hidden';
  svRender();svTick();
}
function svClose(){
  document.getElementById('svOvl').classList.remove('on');
  document.body.style.overflow='';
  clearTimeout(svTmr);svTmr=null;
}
function svStep(d){
  clearTimeout(svTmr);svIdx+=d;
  if(svIdx<0)svIdx=0;
  if(svIdx>=stories.length){svClose();return;}
  svRender();svTick();
}
function svTick(){clearTimeout(svTmr);svTmr=setTimeout(()=>svStep(1),SV_DUR);}
function svRender(){
  const s=stories[svIdx];if(!s)return;
  // progress bars
  document.getElementById('svBars').innerHTML=stories.map((_,i)=>`
    <div class="sv-bar ${i<svIdx?'past':i===svIdx?'now':''}" ${i===svIdx?`style="--sv-t:${SV_DUR}ms"`:''}>
      <div class="sv-bar-fill"></div>
    </div>`).join('');
  // header
  const init=(s.userFullName||'U').charAt(0).toUpperCase();
  let uavStyle='',uavContent=init;
  if(s.userProfileImage){uavStyle=`background:url('${s.userProfileImage}') center/cover no-repeat`;uavContent='';}
  document.getElementById('svTop').innerHTML=`
    <div class="sv-uav" style="${uavStyle}">${uavContent}</div>
    <div>
      <div class="sv-uname">${esc(s.userFullName||'User')}</div>
      <div class="sv-utime">${ago(s.createdAt)}</div>
    </div>
    <button class="sv-x" onclick="svClose()">✕</button>`;
  // media
  const mediaEl=document.getElementById('svMedia');mediaEl.innerHTML='';
  const ft=s.fileType||s.mediaType||'';
  let src=s.fileUrl||(s.mediaUrl&&ft?`data:${ft};base64,${s.mediaUrl}`:'');
  if(!src){
    mediaEl.innerHTML=`<div style="color:rgba(255,255,255,.45);font-size:14px">No media available</div>`;
  } else if(ft.startsWith('image/')||/\.(jpg|jpeg|png|gif|webp|svg|bmp)(\?|$)/i.test(src)){
    const img=document.createElement('img');img.src=src;img.alt='Story';
    img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;';
    img.onerror=()=>{mediaEl.innerHTML=`<div style="color:rgba(255,255,255,.4)">Could not load image</div>`;};
    mediaEl.appendChild(img);
  } else if(ft.startsWith('video/')||/\.(mp4|mov|avi|webm|mkv|m4v)(\?|$)/i.test(src)){
    const v=document.createElement('video');v.src=src;v.controls=true;v.autoplay=true;
    v.style.cssText='max-width:100%;max-height:100%;object-fit:contain;';
    mediaEl.appendChild(v);
  } else if(ft.startsWith('audio/')){
    const a=document.createElement('audio');a.src=src;a.controls=true;a.autoplay=true;
    a.style.cssText='width:80%;max-width:340px;';
    mediaEl.appendChild(a);
  } else {
    const img=document.createElement('img');img.src=src;img.alt='Story';
    img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;';
    img.onerror=()=>{
      mediaEl.innerHTML='';
      const v=document.createElement('video');v.src=src;v.controls=true;v.autoplay=true;
      v.style.cssText='max-width:100%;max-height:100%;';
      v.onerror=()=>{mediaEl.innerHTML=`<div style="color:rgba(255,255,255,.4)">Unsupported media</div>`;};
      mediaEl.appendChild(v);
    };
    mediaEl.appendChild(img);
  }
  // caption
  const cap=document.getElementById('svCap');
  if(s.caption){cap.textContent=s.caption;cap.style.display='block';}
  else cap.style.display='none';
}

/* ── keyboard nav ── */
document.addEventListener('keydown',e=>{
  if(!document.getElementById('svOvl').classList.contains('on'))return;
  if(e.key==='Escape')svClose();
  if(e.key==='ArrowLeft')svStep(-1);
  if(e.key==='ArrowRight')svStep(1);
});

/* ── touch swipe on story viewer ── */
(()=>{
  let tx=0;
  const sv=document.getElementById('svOvl');
  sv.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
  sv.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)>50){svStep(dx<0?1:-1);}
  },{passive:true});
})();

/* ── close overlays on back button (mobile) ── */
window.addEventListener('popstate',()=>{
  ['profileOvl','groupOvl','storyOvl'].forEach(id=>{
    if(document.getElementById(id).classList.contains('on'))closeOvl(id);
  });
  if(document.getElementById('chatOvl').classList.contains('on'))closeChat();
  if(document.getElementById('svOvl').classList.contains('on'))svClose();
  if(document.getElementById('mobDrawer').classList.contains('on'))closeDrawer();
});

init();
</script>
