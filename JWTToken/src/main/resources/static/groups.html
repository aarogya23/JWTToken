<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commune — Connect & Share</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <style>
    :root {
      --bg: #0d0e12;
      --surface: #16181f;
      --surface2: #1e2029;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --accent: #7c6af7;
      --accent2: #f25f7b;
      --accent3: #3dd9c9;
      --text: #f0f1f5;
      --text2: #888a9b;
      --text3: #555766;
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      position: sticky; top: 0; z-index: 200;
      background: rgba(13,14,18,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-brand {
      font-family: 'Syne', sans-serif;
      font-size: 22px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .topbar-nav { display: flex; gap: 6px; align-items: center; }
    .nav-btn {
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s;
    }
    .nav-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .nav-btn.primary {
      background: var(--accent); color: #fff;
      border-color: transparent;
    }
    .nav-btn.primary:hover { background: #6b5ae0; }
    .nav-btn.danger { border-color: rgba(242,95,123,0.3); color: var(--accent2); }
    .nav-btn.danger:hover { background: rgba(242,95,123,0.1); }

    /* ─── LAYOUT ─── */
    .layout {
      display: flex;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
      gap: 20px;
    }
    .sidebar {
      width: 260px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 16px;
    }
    .feed-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 16px; }

    /* ─── CARDS ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .card-header-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .card-body { padding: 16px 18px; }

    /* ─── AVATAR ─── */
    .avatar {
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700; color: #fff;
      flex-shrink: 0;
      background-size: cover; background-position: center;
    }
    .avatar-lg { width: 52px; height: 52px; font-size: 20px; }
    .avatar-md { width: 38px; height: 38px; font-size: 14px; }
    .avatar-sm { width: 30px; height: 30px; font-size: 11px; }

    /* ─── PROFILE SIDEBAR CARD ─── */
    .profile-card { text-align: center; padding: 24px 18px; }
    .profile-card .avatar { margin: 0 auto 14px; cursor: pointer; position: relative; }
    .profile-card .avatar:hover::after {
      content: '📷';
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .profile-name {
      font-family: 'Syne', sans-serif;
      font-size: 17px; font-weight: 700;
      margin-bottom: 4px;
    }
    .profile-email { font-size: 12px; color: var(--text2); }
    .profile-bio { font-size: 13px; color: var(--text2); margin-top: 10px; font-style: italic; }
    .profile-edit-btn {
      margin-top: 14px;
      width: 100%;
      padding: 9px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text2);
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s;
    }
    .profile-edit-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── STORIES ROW ─── */
    .stories-row {
      display: flex; gap: 10px;
      padding: 16px 18px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stories-row::-webkit-scrollbar { display: none; }
    .story-thumb {
      flex-shrink: 0;
      width: 72px;
      cursor: pointer; text-align: center;
    }
    .story-thumb-ring {
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 2.5px; margin: 0 auto 6px;
      transition: transform .2s;
    }
    .story-thumb:hover .story-thumb-ring { transform: scale(1.07); }
    .story-thumb-ring.add-story {
      background: var(--surface2);
      border: 2px dashed var(--border-hover);
    }
    .story-thumb-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      border: 2px solid var(--surface);
      background-size: cover; background-position: center;
      overflow: hidden;
    }
    .story-thumb-label {
      font-size: 11px; color: var(--text2);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 68px;
    }

    /* ─── CREATE POST AREA ─── */
    .compose-area {
      display: flex; gap: 12px; align-items: center;
      padding: 14px 18px; border-bottom: 1px solid var(--border);
    }
    .compose-input {
      flex: 1; padding: 10px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      cursor: pointer; transition: border-color .2s;
    }
    .compose-input:hover { border-color: var(--border-hover); }
    .compose-actions {
      display: flex; gap: 8px; padding: 10px 18px;
    }
    .compose-btn {
      flex: 1; padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text2); font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .compose-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,0.06); }

    /* ─── FEED ITEMS ─── */
    .feed-item {
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .feed-item-header {
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .feed-item-meta { flex: 1; }
    .feed-item-name {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700;
    }
    .feed-item-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .feed-item-body { padding: 14px 18px; }
    .feed-item-desc { font-size: 14px; color: var(--text2); margin-bottom: 14px; line-height: 1.55; }
    .feed-item-actions { display: flex; gap: 8px; }
    .item-btn {
      flex: 1; padding: 8px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text2); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s; font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .item-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .item-btn.open:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,0.06); }
    .item-btn.del:hover { border-color: rgba(242,95,123,0.4); color: var(--accent2); background: rgba(242,95,123,0.06); }

    /* TYPE BADGES */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600; font-family: 'Syne', sans-serif;
    }
    .badge-group { background: rgba(124,106,247,0.15); color: var(--accent); }
    .badge-story { background: rgba(242,95,123,0.15); color: var(--accent2); }

    /* EMPTY STATE */
    .empty-state {
      padding: 50px 20px; text-align: center;
    }
    .empty-state-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.4; }
    .empty-state-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
    .empty-state-sub { font-size: 13px; color: var(--text3); }

    /* ─── MODAL BASE ─── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 90%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      animation: modalIn .2s ease both;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; }
    .modal-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text2); font-size: 18px; line-height: 1;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { color: var(--text); border-color: var(--border-hover); }
    .modal-body { padding: 20px; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
    }

    /* FORM ELEMENTS */
    .f-group { margin-bottom: 16px; }
    .f-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    .f-input, .f-textarea, .f-select {
      width: 100%; padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      transition: border-color .2s;
    }
    .f-input:focus, .f-textarea:focus { outline: none; border-color: var(--accent); }
    .f-input::placeholder, .f-textarea::placeholder { color: var(--text3); }
    .f-textarea { resize: vertical; min-height: 80px; }
    .f-input:disabled { opacity: 0.5; cursor: not-allowed; }

    /* FILE UPLOAD */
    .file-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 24px; text-align: center;
      cursor: pointer; transition: all .2s;
      position: relative;
    }
    .file-drop:hover { border-color: var(--accent); background: rgba(124,106,247,0.04); }
    .file-drop input { display: none; }
    .file-drop-icon { font-size: 28px; margin-bottom: 8px; }
    .file-drop-text { font-size: 13px; color: var(--text2); }
    .file-drop-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

    /* Preview */
    .file-preview { margin-top: 12px; border-radius: var(--radius-sm); overflow: hidden; max-height: 240px; background: var(--surface2); }
    .file-preview img, .file-preview video { width: 100%; display: block; max-height: 240px; object-fit: cover; }
    .file-preview audio { width: 100%; padding: 10px; }

    /* Buttons */
    .btn {
      padding: 9px 20px; border: none; border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all .2s;
    }
    .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-hover); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6b5ae0; transform: translateY(-1px); }
    .btn-primary:disabled { background: var(--text3); cursor: not-allowed; transform: none; }

    /* Profile avatar section in modal */
    .profile-img-wrap {
      text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
    }
    .profile-img-wrap .avatar { margin: 0 auto 12px; cursor: pointer; }
    #profileImgInput { display: none; }

    /* ─── CHAT PANEL ─── */
    .chat-overlay {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    .chat-overlay.open { display: flex; }
    .chat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 92%; max-width: 580px;
      height: 85vh;
      display: flex; flex-direction: column;
      animation: modalIn .2s ease both;
    }
    .chat-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .chat-head-title { flex: 1; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
    .chat-head-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text2); font-size: 18px;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-head-close:hover { color: var(--text); border-color: var(--border-hover); }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      background: var(--bg);
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .chat-loading { text-align: center; color: var(--text3); font-size: 13px; padding: 30px; }

    .msg-wrap { display: flex; gap: 8px; align-items: flex-end; }
    .msg-wrap.own { flex-direction: row-reverse; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; background-size: cover; background-position: center; }
    .msg-bubble {
      max-width: 68%;
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 14px; line-height: 1.45;
    }
    .msg-wrap.other .msg-bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; }
    .msg-wrap.own .msg-bubble { border-bottom-right-radius: 4px; color: #fff; }
    .msg-sender { font-size: 11px; color: var(--text3); margin-bottom: 3px; font-weight: 600; }
    .msg-time { font-size: 10px; margin-top: 4px; opacity: 0.55; }
    .msg-media { margin-top: 8px; max-width: 220px; border-radius: 8px; overflow: hidden; }
    .msg-media img, .msg-media video { width: 100%; display: block; border-radius: 8px; }
    .msg-media audio { width: 100%; }

    .chat-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
    }
    .chat-file-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text2); font-size: 16px;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-file-btn:hover { border-color: var(--accent); color: var(--accent); }
    .chat-input {
      flex: 1; padding: 9px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      transition: border-color .2s;
    }
    .chat-input:focus { outline: none; border-color: var(--accent); }
    .chat-input::placeholder { color: var(--text3); }
    .chat-send-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: var(--radius-sm);
      background: var(--accent); border: none;
      color: #fff; font-size: 16px;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-send-btn:hover { background: #6b5ae0; transform: scale(1.05); }

    /* ─── STORY VIEWER ─── */
    .sv-overlay {
      display: none; position: fixed; inset: 0; z-index: 800;
      background: #000;
      flex-direction: column;
    }
    .sv-overlay.open { display: flex; }

    .sv-progress {
      display: flex; gap: 4px;
      padding: 12px 12px 8px;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
      position: absolute; top: 0; left: 0; right: 0; z-index: 2;
    }
    .sv-bar {
      flex: 1; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.25); overflow: hidden;
    }
    .sv-bar-fill {
      height: 100%; background: #fff; width: 0%;
    }
    .sv-bar.done .sv-bar-fill { width: 100%; }
    .sv-bar.active .sv-bar-fill {
      animation: svProgress var(--sv-dur, 5000ms) linear forwards;
    }
    @keyframes svProgress { from { width: 0%; } to { width: 100%; } }

    .sv-header {
      position: absolute; top: 40px; left: 0; right: 0; z-index: 2;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .sv-user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: #fff;
      flex-shrink: 0; background-size: cover; background-position: center;
    }
    .sv-user-name { color: #fff; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
    .sv-time { color: rgba(255,255,255,0.65); font-size: 12px; }
    .sv-close {
      margin-left: auto;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none; color: #fff; font-size: 18px;
      cursor: pointer; transition: background .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .sv-close:hover { background: rgba(255,255,255,0.25); }

    .sv-media-area {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .sv-media-area img, .sv-media-area video {
      max-width: 100%; max-height: 100%; object-fit: contain;
    }
    .sv-media-area audio { width: 80%; max-width: 360px; }

    .sv-caption {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
      padding: 40px 20px 24px;
      background: linear-gradient(0deg, rgba(0,0,0,0.75) 0%, transparent 100%);
      color: #fff; font-size: 14px; line-height: 1.5;
    }

    .sv-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      z-index: 3; background: none; border: none;
      color: rgba(255,255,255,0.7); font-size: 32px; cursor: pointer;
      padding: 20px 12px; transition: color .2s;
    }
    .sv-nav:hover { color: #fff; }
    .sv-nav.prev { left: 0; }
    .sv-nav.next { right: 0; }

    /* ─── TABS ─── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
    .tab-btn {
      padding: 10px 16px;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text3); font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover { color: var(--text2); }

    /* ─── SIDEBAR QUICK GROUPS ─── */
    .sg-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer; transition: background .2s;
      border-radius: var(--radius-sm);
    }
    .sg-item:hover { background: var(--surface2); }
    .sg-icon { width: 34px; height: 34px; border-radius: var(--radius-sm);
      background: rgba(124,106,247,0.15); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .sg-name { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sg-open-btn {
      padding: 4px 8px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text3); font-size: 11px; cursor: pointer; transition: all .2s;
    }
    .sg-open-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* Mobile */
    @media (max-width: 720px) {
      .sidebar { display: none; }
      .layout { padding: 12px 8px; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">commune</div>
  <div class="topbar-nav">
    <button class="nav-btn" onclick="openProfileModal()">👤 Profile</button>
    <button class="nav-btn primary" onclick="openStoryModal()">+ Story</button>
    <button class="nav-btn danger" onclick="logout()">Sign out</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <!-- Profile Card -->
    <div class="card">
      <div class="profile-card">
        <div class="avatar avatar-lg" id="sidebarAvatar" style="background: linear-gradient(135deg,#7c6af7,#f25f7b)" onclick="openProfileModal()">U</div>
        <div class="profile-name" id="sidebarName">Loading…</div>
        <div class="profile-email" id="sidebarEmail"></div>
        <div class="profile-bio" id="sidebarBio"></div>
        <button class="profile-edit-btn" onclick="openProfileModal()">✏️ Edit Profile</button>
      </div>
    </div>
    <!-- Quick Groups -->
    <div class="card" id="sidebarGroupsCard">
      <div class="card-header"><span class="card-header-title">💬 My Groups</span></div>
      <div id="sidebarGroupsList" style="padding: 8px;"></div>
    </div>
  </div>

  <!-- FEED COLUMN -->
  <div class="feed-col">

    <!-- Stories Row -->
    <div class="card">
      <div class="stories-row" id="storiesRow">
        <!-- Add Story thumb -->
        <div class="story-thumb" onclick="openStoryModal()">
          <div class="story-thumb-ring add-story">
            <div class="story-thumb-inner">➕</div>
          </div>
          <div class="story-thumb-label">Your Story</div>
        </div>
      </div>
    </div>

    <!-- Compose -->
    <div class="card">
      <div class="compose-area">
        <div class="avatar avatar-sm" id="composeAvatar" style="background: linear-gradient(135deg,#7c6af7,#f25f7b)">U</div>
        <div class="compose-input" onclick="void(0)">What's on your mind?</div>
      </div>
      <div class="compose-actions">
        <button class="compose-btn" onclick="openGroupModal()">👥 Create Group</button>
        <button class="compose-btn" onclick="openStoryModal()">📸 Share Story</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" id="tabAll" onclick="setTab('all')">All</button>
        <button class="tab-btn" id="tabGroups" onclick="setTab('groups')">Groups</button>
        <button class="tab-btn" id="tabStories" onclick="setTab('stories')">Stories</button>
      </div>
      <div id="feedContainer" style="min-height: 120px;"></div>
    </div>

  </div>
</div>

<!-- ═══════════ MODALS ═══════════ -->

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title">My Profile</span>
      <button class="modal-close" onclick="closeModal('profileModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="profile-img-wrap">
        <div class="avatar avatar-lg" id="profileImgDisplay" style="background:linear-gradient(135deg,#7c6af7,#f25f7b)" onclick="document.getElementById('profileImgInput').click()">U</div>
        <input type="file" id="profileImgInput" accept="image/*" onchange="onProfileImgChange(event)">
        <div style="font-size:11px;color:var(--text3);margin-top:6px">Click photo to change</div>
      </div>
      <div class="f-group"><label class="f-label">Full Name</label><input class="f-input" id="pFullName" placeholder="Your name"></div>
      <div class="f-group"><label class="f-label">Email</label><input class="f-input" id="pEmail" disabled placeholder="email@example.com"></div>
      <div class="f-group"><label class="f-label">Bio</label><input class="f-input" id="pBio" placeholder="A short bio"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('profileModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Create Group Modal -->
<div class="modal-overlay" id="groupModal">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title">Create Group</span>
      <button class="modal-close" onclick="closeModal('groupModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="f-group"><label class="f-label">Group Name</label><input class="f-input" id="gName" placeholder="e.g. Tech Talks"></div>
      <div class="f-group"><label class="f-label">Description</label><textarea class="f-textarea" id="gDesc" placeholder="What is this group about?"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('groupModal')">Cancel</button>
      <button class="btn btn-primary" onclick="createGroup()">Create Group</button>
    </div>
  </div>
</div>

<!-- Create Story Modal -->
<div class="modal-overlay" id="storyModal">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title">Share a Story</span>
      <button class="modal-close" onclick="closeModal('storyModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="f-group">
        <label class="f-label">Media</label>
        <label class="file-drop" for="storyFileInput">
          <input type="file" id="storyFileInput" accept="image/*,video/*,audio/*" onchange="onStoryFileChange(event)">
          <div class="file-drop-icon">📁</div>
          <div class="file-drop-text">Click to select image, video, or audio</div>
          <div class="file-drop-sub">Max 15MB</div>
        </label>
        <div class="file-preview" id="storyPreview" style="display:none;"></div>
      </div>
      <div class="f-group"><label class="f-label">Caption (optional)</label><textarea class="f-textarea" id="storyCaption" placeholder="Say something…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('storyModal')">Cancel</button>
      <button class="btn btn-primary" id="storySubmitBtn" onclick="createStory()">Share Story</button>
    </div>
  </div>
</div>

<!-- ═══════════ CHAT ═══════════ -->
<div class="chat-overlay" id="chatOverlay">
  <div class="chat-box">
    <div class="chat-head">
      <div class="avatar avatar-sm" style="background:linear-gradient(135deg,#7c6af7,#f25f7b)">💬</div>
      <div class="chat-head-title" id="chatTitle">Group Chat</div>
      <button class="chat-head-close" onclick="closeChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"><div class="chat-loading">Loading messages…</div></div>
    <div class="chat-footer">
      <input type="file" id="chatFileInput" style="display:none" onchange="onChatFileSelect(event)">
      <button class="chat-file-btn" onclick="document.getElementById('chatFileInput').click()" title="Attach file">📎</button>
      <input class="chat-input" id="chatMsgInput" placeholder="Type a message…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage();}">
      <button class="chat-send-btn" onclick="sendChatMessage()">➤</button>
    </div>
  </div>
</div>

<!-- ═══════════ STORY VIEWER ═══════════ -->
<div class="sv-overlay" id="svOverlay">
  <div class="sv-progress" id="svProgress"></div>
  <div class="sv-header" id="svHeader"></div>
  <div class="sv-media-area" id="svMedia"></div>
  <div class="sv-caption" id="svCaption" style="display:none;"></div>
  <button class="sv-nav prev" onclick="svGo(-1)">❮</button>
  <button class="sv-nav next" onclick="svGo(1)">❯</button>
</div>

<!-- ═══════════ SCRIPT ═══════════ -->
<script>
  // ── Bootstrap token ──
  (() => {
    const p = new URLSearchParams(location.search);
    const t = p.get('token');
    if (t) { localStorage.setItem('jwtToken', t); history.replaceState({}, '', location.pathname); }
    if (!localStorage.getItem('jwtToken')) localStorage.setItem('jwtToken', 'dummy-token-for-testing');
  })();

  const token = () => localStorage.getItem('jwtToken');
  const authH = () => ({ 'Authorization': 'Bearer ' + token() });
  const jsonH = () => ({ ...authH(), 'Content-Type': 'application/json' });

  let currentUser = null;
  let allGroups = [];
  let allStories = [];
  let currentTab = 'all';

  // Chat
  let chatGroupId = null;
  let stompClient = null;
  let pendingFile = null;

  // Story viewer
  let svIndex = 0;
  let svTimer = null;
  const SV_DUR = 5000;

  // Color map for chat avatars
  const uColors = {};
  const palette = ['#7c6af7','#f25f7b','#3dd9c9','#f5a623','#30c96d','#e56cf8','#4facfe'];
  const uColor = name => { if (!uColors[name]) uColors[name] = palette[Object.keys(uColors).length % palette.length]; return uColors[name]; };

  function escH(t) {
    return String(t).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  }

  function timeAgo(d) {
    const s = Math.floor((Date.now() - new Date(d)) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
  }

  // ── MODAL HELPERS ──
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  document.querySelectorAll('.modal-overlay, .chat-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  // ── INIT ──
  function init() {
    fetch('/api/profile', { headers: authH() })
      .then(r => r.json())
      .then(user => {
        currentUser = user;
        applyUserUI();
        document.getElementById('pFullName').value = user.fullName || '';
        document.getElementById('pEmail').value = user.email || '';
        document.getElementById('pBio').value = user.bio || '';
      })
      .catch(() => {
        currentUser = { id: 1, fullName: 'You', email: 'you@example.com', bio: '' };
        applyUserUI();
      });
    loadGroups();
    loadStories();
  }

  function applyUserUI() {
    if (!currentUser) return;
    const initials = (currentUser.fullName || 'U').charAt(0).toUpperCase();
    const img = currentUser.profileImage;

    ['sidebarAvatar','composeAvatar','profileImgDisplay'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      if (img) { el.style.backgroundImage = `url(${img})`; el.textContent = ''; }
      else { el.style.backgroundImage = 'none'; el.textContent = initials; }
    });

    document.getElementById('sidebarName').textContent = currentUser.fullName || 'User';
    document.getElementById('sidebarEmail').textContent = currentUser.email || '';
    document.getElementById('sidebarBio').textContent = currentUser.bio || '';
  }

  // ── GROUPS ──
  function loadGroups() {
    fetch('/api/groups', { headers: authH() })
      .then(r => r.json())
      .then(g => { allGroups = g || []; renderFeed(); renderSidebarGroups(); })
      .catch(() => { allGroups = []; renderFeed(); renderSidebarGroups(); });
  }

  function renderSidebarGroups() {
    const list = document.getElementById('sidebarGroupsList');
    if (!allGroups.length) { list.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:var(--text3)">No groups yet</div>'; return; }
    list.innerHTML = allGroups.map(g => `
      <div class="sg-item">
        <div class="sg-icon">👥</div>
        <div class="sg-name">${escH(g.name)}</div>
        <button class="sg-open-btn" onclick="openGroup(${g.id})">Chat</button>
      </div>
    `).join('');
  }

  // ── STORIES ──
  function loadStories() {
    fetch('/api/stories/all', { headers: authH() })
      .then(r => r.json())
      .then(s => { allStories = s || []; renderFeed(); renderStoriesRow(); })
      .catch(() => { allStories = []; renderFeed(); renderStoriesRow(); });
  }

  function renderStoriesRow() {
    const row = document.getElementById('storiesRow');
    // keep the + button
    const addBtn = row.children[0];
    row.innerHTML = '';
    row.appendChild(addBtn);

    allStories.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'story-thumb';
      div.onclick = () => svOpen(i);
      const initials = (s.userFullName || 'U').charAt(0).toUpperCase();
      div.innerHTML = `
        <div class="story-thumb-ring">
          <div class="story-thumb-inner">${initials}</div>
        </div>
        <div class="story-thumb-label">${escH(s.userFullName || 'User')}</div>
      `;
      row.appendChild(div);
    });
  }

  // ── FEED ──
  function setTab(t) {
    currentTab = t;
    ['all','groups','stories'].forEach(x => document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active', x===t));
    renderFeed();
  }

  function renderFeed() {
    const el = document.getElementById('feedContainer');
    let items = [];
    if (currentTab !== 'stories') items = items.concat(allGroups.map(g => ({type:'group', data:g})));
    if (currentTab !== 'groups') items = items.concat(allStories.map((s,i) => ({type:'story', data:s, index:i})));

    if (!items.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Nothing here yet</div><div class="empty-state-sub">Create a group or share a story to get started</div></div>`;
      return;
    }

    el.innerHTML = '';
    items.forEach(({type, data, index}, i) => {
      const card = document.createElement('div');
      card.className = 'card feed-item';
      card.style.animationDelay = (i * 0.05) + 's';

      if (type === 'group') {
        card.innerHTML = `
          <div class="feed-item-header">
            <div class="avatar avatar-md" style="background:linear-gradient(135deg,#7c6af7,#3dd9c9)">👥</div>
            <div class="feed-item-meta">
              <div class="feed-item-name">${escH(data.name)}</div>
              <div class="feed-item-sub"><span class="badge badge-group">Group</span></div>
            </div>
          </div>
          <div class="feed-item-body">
            <div class="feed-item-desc">${data.description ? escH(data.description) : 'A private group for messaging.'}</div>
            <div class="feed-item-actions">
              <button class="item-btn open" onclick="openGroup(${data.id})">💬 Open Chat</button>
              <button class="item-btn del" onclick="deleteGroup(${data.id})">🗑 Delete</button>
            </div>
          </div>`;
      } else {
        const ago = timeAgo(data.createdAt);
        const init = (data.userFullName||'U').charAt(0).toUpperCase();
        const isOwn = data.userId === currentUser?.id;
        card.innerHTML = `
          <div class="feed-item-header">
            <div class="avatar avatar-md" style="background:linear-gradient(135deg,#f25f7b,#f5a623)">${init}</div>
            <div class="feed-item-meta">
              <div class="feed-item-name">${escH(data.userFullName || 'User')}</div>
              <div class="feed-item-sub"><span class="badge badge-story">Story</span> · ${ago}</div>
            </div>
          </div>
          <div class="feed-item-body">
            ${data.caption ? `<div class="feed-item-desc">${escH(data.caption)}</div>` : ''}
            <div class="feed-item-actions">
              <button class="item-btn open" onclick="svOpen(${index})">👁 View Story</button>
              ${isOwn ? `<button class="item-btn del" onclick="deleteStory(${data.id})">🗑 Delete</button>` : ''}
            </div>
          </div>`;
      }
      el.appendChild(card);
    });
  }

  // ── CRUD ──
  function openGroupModal() { openModal('groupModal'); }
  function openStoryModal() { openModal('storyModal'); }
  function openProfileModal() { applyUserUI(); openModal('profileModal'); }

  function createGroup() {
    const name = document.getElementById('gName').value.trim();
    const description = document.getElementById('gDesc').value.trim();
    if (!name) { alert('Group name is required'); return; }
    fetch('/api/groups', { method:'POST', headers: jsonH(), body: JSON.stringify({name, description}) })
      .then(r => r.json()).then(() => { closeModal('groupModal'); document.getElementById('gName').value=''; document.getElementById('gDesc').value=''; loadGroups(); })
      .catch(() => alert('Failed to create group'));
  }

  function deleteGroup(id) {
    if (!confirm('Delete this group?')) return;
    fetch('/api/groups/'+id, { method:'DELETE', headers: authH() })
      .then(() => loadGroups()).catch(() => alert('Failed'));
  }

  function onStoryFileChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    const prev = document.getElementById('storyPreview');
    const reader = new FileReader();
    reader.onload = function(ev) {
      if (file.type.startsWith('image/')) prev.innerHTML = `<img src="${ev.target.result}">`;
      else if (file.type.startsWith('video/')) prev.innerHTML = `<video controls><source src="${ev.target.result}" type="${file.type}"></video>`;
      else if (file.type.startsWith('audio/')) prev.innerHTML = `<audio controls style="width:100%;padding:10px"><source src="${ev.target.result}" type="${file.type}"></audio>`;
      prev.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function createStory() {
    const fileInput = document.getElementById('storyFileInput');
    const caption = document.getElementById('storyCaption').value.trim();
    if (!fileInput.files[0]) { alert('Please select a file'); return; }
    const fd = new FormData();
    fd.append('file', fileInput.files[0]);
    if (caption) fd.append('caption', caption);
    const btn = document.getElementById('storySubmitBtn');
    btn.disabled = true; btn.textContent = 'Sharing…';
    fetch('/api/stories/upload', { method:'POST', headers: authH(), body: fd })
      .then(r => r.json())
      .then(() => {
        closeModal('storyModal');
        document.getElementById('storyFileInput').value='';
        document.getElementById('storyCaption').value='';
        document.getElementById('storyPreview').style.display='none';
        btn.disabled=false; btn.textContent='Share Story';
        loadStories();
      })
      .catch(() => { alert('Failed to share story'); btn.disabled=false; btn.textContent='Share Story'; });
  }

  function deleteStory(id) {
    if (!confirm('Delete this story?')) return;
    fetch('/api/stories/'+id, { method:'DELETE', headers: authH() })
      .then(() => loadStories()).catch(() => alert('Failed'));
  }

  function saveProfile() {
    const fullName = document.getElementById('pFullName').value.trim();
    const bio = document.getElementById('pBio').value.trim();
    if (!fullName) { alert('Name is required'); return; }
    fetch('/api/profile', { method:'PUT', headers: jsonH(), body: JSON.stringify({ fullName, bio, profileImage: currentUser?.profileImage || null }) })
      .then(r => r.json())
      .then(u => { currentUser = u; applyUserUI(); closeModal('profileModal'); })
      .catch(() => alert('Failed to save'));
  }

  function onProfileImgChange(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { if (currentUser) { currentUser.profileImage = ev.target.result; applyUserUI(); } };
    reader.readAsDataURL(file);
  }

  function logout() { localStorage.removeItem('jwtToken'); location.href='/login.html'; }

  // ── CHAT ──
  function openGroup(id) {
    chatGroupId = id;
    const g = allGroups.find(x => x.id===id);
    document.getElementById('chatTitle').textContent = g?.name || 'Group Chat';
    document.getElementById('chatMessages').innerHTML = '<div class="chat-loading">Loading…</div>';
    openModal('chatOverlay'); loadChatHistory();
    if (!stompClient || !stompClient.connected) connectWS();
  }

  function closeChat() { closeModal('chatOverlay'); chatGroupId=null; }

  function connectWS() {
    const sock = new SockJS('/ws?token='+token());
    stompClient = Stomp.over(sock);
    stompClient.connect({}, () => {
      if (chatGroupId) stompClient.subscribe('/topic/group/'+chatGroupId, m => renderMsg(JSON.parse(m.body)));
    }, err => { console.error(err); setTimeout(connectWS, 5000); });
  }

  function loadChatHistory() {
    fetch('/api/chat/history?groupId='+chatGroupId, { headers: authH() })
      .then(r => r.json())
      .then(msgs => {
        const el = document.getElementById('chatMessages');
        el.innerHTML = '';
        if (!msgs.length) { el.innerHTML = '<div class="chat-loading">No messages yet. Start chatting!</div>'; return; }
        msgs.forEach(renderMsg);
      })
      .catch(() => { document.getElementById('chatMessages').innerHTML = '<div class="chat-loading">Could not load messages.</div>'; });
  }

  function renderMsg(msg) {
    const el = document.getElementById('chatMessages');
    if (el.querySelector('.chat-loading')) el.innerHTML = '';
    const own = msg.sender === currentUser?.fullName;
    const color = uColor(msg.sender || 'User');
    const init = (msg.sender||'U').charAt(0).toUpperCase();
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + (own?'own':'other');

    let mediaHtml = '';
    if (msg.fileUrl) {
      const ft = msg.fileType || '';
      if (ft.startsWith('image/')) mediaHtml = `<div class="msg-media"><img src="${msg.fileUrl}" alt="${escH(msg.fileName||'image')}"></div>`;
      else if (ft.startsWith('video/')) mediaHtml = `<div class="msg-media"><video controls width="200"><source src="${msg.fileUrl}" type="${ft}"></video></div>`;
      else if (ft.startsWith('audio/')) mediaHtml = `<div class="msg-media"><audio controls><source src="${msg.fileUrl}" type="${ft}"></audio></div>`;
      else mediaHtml = `<div><a href="${msg.fileUrl}" download="${escH(msg.fileName||'file')}" style="color:var(--accent3);font-size:13px">📥 ${escH(msg.fileName||'Download')}</a></div>`;
    }

    wrap.innerHTML = `
      <div class="msg-avatar" style="background:${color}">${init}</div>
      <div class="msg-bubble" style="background:${own?color:'var(--surface2)'}">
        ${!own?`<div class="msg-sender">${escH(msg.sender||'User')}</div>`:''}
        <div>${escH(msg.content||'')}</div>
        ${mediaHtml}
        <div class="msg-time">${new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
    `;
    el.appendChild(wrap);
    el.scrollTop = el.scrollHeight;
  }

  function sendChatMessage() {
    const input = document.getElementById('chatMsgInput');
    const content = input.value.trim();
    if ((!content && !pendingFile) || !stompClient || !chatGroupId) return;
    const msg = { content, sender: currentUser?.fullName||'User', groupId: chatGroupId, timestamp: new Date().toISOString() };
    if (pendingFile) { Object.assign(msg, pendingFile); pendingFile=null; document.getElementById('chatFileInput').value=''; }
    stompClient.send('/app/chat.sendMessage/'+chatGroupId, {}, JSON.stringify(msg));
    input.value=''; input.focus();
  }

  function onChatFileSelect(e) {
    const file = e.target.files[0]; if (!file) return;
    const fd = new FormData(); fd.append('file', file);
    fetch('/api/chat/upload', { method:'POST', headers: authH(), body: fd })
      .then(r => r.json())
      .then(d => { if (!d.error) { pendingFile = d; alert('File ready: '+d.fileName+'. Send your message.'); } else alert('Upload error: '+d.error); })
      .catch(() => alert('Upload failed'));
  }

  // ── STORY VIEWER ──
  // Fix: build media from fileUrl OR base64 mediaUrl
  function svOpen(index) {
    if (!allStories.length) return;
    svIndex = index;
    document.getElementById('svOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    svRender();
    svStartTimer();
  }

  function svClose() {
    document.getElementById('svOverlay').classList.remove('open');
    document.body.style.overflow = '';
    clearTimeout(svTimer);
    svTimer = null;
  }

  function svGo(dir) {
    clearTimeout(svTimer);
    svIndex += dir;
    if (svIndex < 0) svIndex = 0;
    if (svIndex >= allStories.length) { svClose(); return; }
    svRender();
    svStartTimer();
  }

  function svStartTimer() {
    clearTimeout(svTimer);
    svTimer = setTimeout(() => svGo(1), SV_DUR);
  }

  function svRender() {
    const story = allStories[svIndex];
    if (!story) return;

    // Progress bars
    const prog = document.getElementById('svProgress');
    prog.innerHTML = allStories.map((_, i) => {
      let cls = 'sv-bar';
      if (i < svIndex) cls += ' done';
      if (i === svIndex) cls += ' active';
      return `<div class="${cls}" style="${i===svIndex?'--sv-dur:'+SV_DUR+'ms':''}"><div class="sv-bar-fill"></div></div>`;
    }).join('');

    // Header
    const init = (story.userFullName||'U').charAt(0).toUpperCase();
    document.getElementById('svHeader').innerHTML = `
      <div class="sv-user-avatar">${init}</div>
      <div>
        <div class="sv-user-name">${escH(story.userFullName||'User')}</div>
        <div class="sv-time">${timeAgo(story.createdAt)}</div>
      </div>
      <button class="sv-close" onclick="svClose()">✕</button>
    `;

    // Media — support both fileUrl (from groups page) and base64 mediaUrl (from stories page)
    const mediaEl = document.getElementById('svMedia');
    mediaEl.innerHTML = '';
    const fileType = story.fileType || story.mediaType || '';
    let src = '';

    if (story.fileUrl) {
      src = story.fileUrl;
    } else if (story.mediaUrl) {
      src = `data:${fileType};base64,${story.mediaUrl}`;
    }

    if (!src) {
      mediaEl.innerHTML = `<div style="color:rgba(255,255,255,0.5);font-size:14px">No media available</div>`;
    } else if (fileType.startsWith('image/') || story.fileUrl?.match(/\.(jpg|jpeg|png|gif|webp|svg|bmp)(\?|$)/i)) {
      const img = document.createElement('img');
      img.src = src; img.alt = 'Story';
      img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;';
      img.onerror = () => { mediaEl.innerHTML = `<div style="color:rgba(255,255,255,0.5)">Could not load image</div>`; };
      mediaEl.appendChild(img);
    } else if (fileType.startsWith('video/') || story.fileUrl?.match(/\.(mp4|mov|avi|webm|mkv)(\?|$)/i)) {
      const vid = document.createElement('video');
      vid.src = src; vid.controls = true; vid.autoplay = true;
      vid.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;';
      mediaEl.appendChild(vid);
    } else if (fileType.startsWith('audio/')) {
      const aud = document.createElement('audio');
      aud.src = src; aud.controls = true; aud.autoplay = true;
      aud.style.cssText = 'width:80%;max-width:360px;';
      mediaEl.appendChild(aud);
    } else {
      // Fallback: try as image first
      const img = document.createElement('img');
      img.src = src; img.alt = 'Story';
      img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;';
      img.onerror = () => {
        mediaEl.innerHTML = '';
        const vid = document.createElement('video');
        vid.src = src; vid.controls = true; vid.autoplay = true;
        vid.style.cssText = 'max-width:100%;max-height:100%;';
        vid.onerror = () => { mediaEl.innerHTML = `<div style="color:rgba(255,255,255,0.5)">Unsupported media</div>`; };
        mediaEl.appendChild(vid);
      };
      mediaEl.appendChild(img);
    }

    // Caption
    const cap = document.getElementById('svCaption');
    if (story.caption) { cap.textContent = story.caption; cap.style.display='block'; }
    else cap.style.display='none';
  }

  // Keyboard nav for story viewer
  document.addEventListener('keydown', e => {
    if (!document.getElementById('svOverlay').classList.contains('open')) return;
    if (e.key === 'Escape') svClose();
    if (e.key === 'ArrowLeft') svGo(-1);
    if (e.key === 'ArrowRight') svGo(1);
  });

  // ── START ──
  init();
</script>
</body>
</html>
