<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 22px;
            margin: 0;
        }

        .chat-header-buttons {
            display: flex;
            gap: 10px;
        }

        .chat-header button {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .chat-header button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message.own {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: 20px;
        }

        .message.other {
            background: white;
            margin-right: 20px;
        }

        .message-sender {
            font-weight: 600;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        .message.own .message-sender {
            color: rgba(255, 255, 255, 0.8);
        }

        .message-content {
            word-wrap: break-word;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }

        .message.own .message-time {
            color: rgba(255, 255, 255, 0.6);
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 2px solid #e1e5e9;
            display: flex;
            gap: 10px;
        }

        #message {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 5px;
            font-size: 16px;
            font-family: inherit;
        }

        #message:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .file-upload-container {
            position: relative;
        }

        #fileInput {
            display: none;
        }

        .file-upload-btn {
            padding: 12px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .file-upload-btn:hover {
            background: #45a049;
        }

        .message-file {
            margin-top: 10px;
            max-width: 300px;
        }

        .message-file img,
        .message-file video {
            max-width: 100%;
            border-radius: 5px;
        }

        .file-download {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #2196F3;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-size: 12px;
        }

        .file-download:hover {
            background: #0b7dda;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            color: #667eea;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-header">
            <h1 id="groupTitle">Loading...</h1>
            <div class="chat-header-buttons">
                <button onclick="goBack()">Back to Groups</button>
                <button onclick="logout()">Logout</button>
            </div>
        </div>
        <div id="chat" class="loading">Loading messages...</div>
        <div class="chat-input-container">
            <div class="file-upload-container">
                <input type="file" id="fileInput" onchange="handleFileSelect(event)" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.zip">
                <button class="file-upload-btn" onclick="document.getElementById('fileInput').click()" title="Upload file (images, videos, documents, etc.)">📎</button>
            </div>
            <input id="message" type="text" placeholder="Type a message and press Enter...">
            <div class="loading-spinner" id="uploadSpinner">Uploading...</div>
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const groupId = urlParams.get('groupId');
        const token = localStorage.getItem('jwtToken');
        let currentUser = null;
        let stompClient = null;
        let uploadedFileData = null;  // Store uploaded file data

        if (!groupId || !token) {
            window.location.href = '/groups.html';
        }

        function goBack() {
            window.location.href = '/groups.html';
        }

        function logout() {
            localStorage.removeItem('jwtToken');
            window.location.href = '/login.html';
        }

        function connect() {
            // Load history immediately so the user sees older messages even if WebSocket connection takes time.
            loadHistory();

            const socket = new SockJS('/ws?token=' + token);
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function(frame) {
                console.log('Connected:', frame);
                stompClient.subscribe('/topic/group/' + groupId, function(message) {
                    showMessage(JSON.parse(message.body));
                });
            }, function(error) {
                console.error('Connection error:', error);
                setTimeout(connect, 5000);
            });
        }

        function sendMessage() {
            const messageInput = document.getElementById('message');
            const messageContent = messageInput.value.trim();
            if ((!messageContent && !uploadedFileData) || !stompClient) return;

            const message = {
                content: messageContent,
                sender: currentUser.fullName,
                groupId: groupId,
                timestamp: new Date().toISOString()
            };

            // Add file data if available
            if (uploadedFileData) {
                message.fileUrl = uploadedFileData.fileUrl;
                message.fileName = uploadedFileData.fileName;
                message.fileType = uploadedFileData.fileType;
                message.fileSize = uploadedFileData.fileSize;
                uploadedFileData = null;  // Reset after sending
                document.getElementById('fileInput').value = '';  // Clear file input
            }

            stompClient.send('/app/chat.sendMessage/' + groupId, {}, JSON.stringify(message));
            messageInput.value = '';
            messageInput.focus();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const spinner = document.getElementById('uploadSpinner');
            spinner.style.display = 'block';

            const formData = new FormData();
            formData.append('file', file);

            fetch('/api/chat/upload', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token
                },
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    uploadedFileData = data;
                    alert('File uploaded: ' + data.fileName + '. Now add a message and click Send!');
                }
                spinner.style.display = 'none';
            })
            .catch(error => {
                console.error('Error uploading file:', error);
                alert('Failed to upload file');
                spinner.style.display = 'none';
            });
        }

        function showMessage(message) {
            const chatDiv = document.getElementById('chat');
            if (chatDiv.classList.contains('loading')) {
                chatDiv.classList.remove('loading');
                chatDiv.innerHTML = '';
            }

            const isOwn = message.sender === currentUser.fullName;
            const div = document.createElement('div');
            div.className = 'message ' + (isOwn ? 'own' : 'other');
            
            const timestamp = new Date(message.timestamp).toLocaleTimeString();
            let contentHtml = `
                <div class="message-sender">${escapeHtml(message.sender)}</div>
                <div class="message-content">${escapeHtml(message.content)}</div>
            `;

            // Display file if present
            if (message.fileUrl) {
                const fileType = message.fileType || '';
                if (fileType.startsWith('image/')) {
                    contentHtml += `<div class="message-file"><img src="${message.fileUrl}" alt="${escapeHtml(message.fileName)}"></div>`;
                } else if (fileType.startsWith('video/')) {
                    contentHtml += `<div class="message-file"><video controls width="300"><source src="${message.fileUrl}" type="${fileType}">Your browser does not support the video tag.</video></div>`;
                } else if (fileType.startsWith('audio/')) {
                    contentHtml += `<div class="message-file"><audio controls><source src="${message.fileUrl}" type="${fileType}">Your browser does not support the audio tag.</audio></div>`;
                } else {
                    contentHtml += `<a class="file-download" href="${message.fileUrl}" download="${message.fileName}">📥 ${escapeHtml(message.fileName)}</a>`;
                }
            }

            contentHtml += `<div class="message-time">${timestamp}</div>`;
            div.innerHTML = contentHtml;
            
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function loadHistory() {
            fetch('/api/chat/history?groupId=' + groupId, {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(response => response.json())
            .then(messages => {
                const chatDiv = document.getElementById('chat');
                chatDiv.classList.remove('loading');
                chatDiv.innerHTML = '';
                messages.forEach(msg => showMessage(msg));
            })
            .catch(error => {
                console.error('Error loading history:', error);
                const chatDiv = document.getElementById('chat');
                chatDiv.classList.remove('loading');
                chatDiv.innerHTML = '<p class="loading">No messages yet. Start chatting!</p>';
            });
        }

        function loadGroupInfo() {
            fetch('/api/groups/' + groupId, {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(response => response.json())
            .then(group => {
                document.getElementById('groupTitle').textContent = group.name;
            })
            .catch(error => console.error('Error loading group info:', error));
        }

        function loadCurrentUser() {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                currentUser = { fullName: payload.sub || 'User' };
            } catch (e) {
                currentUser = { fullName: 'User' };
            }
            loadGroupInfo();
            connect();
        }

        document.getElementById('message').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        loadCurrentUser();
    </script>
</body>
</html>
