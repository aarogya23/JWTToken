spring.application.name=JWTToken

server.port=8080

# DB (MySQL on localhost:3306)
# Make sure your MySQL server is running and the database exists (e.g., `jwt_token`).
# Adjust username/password as needed (default below is for a local dev setup).
spring.datasource.url=jdbc:mysql://localhost:3306/jwtDatabase?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# If you ever want to switch back to H2 for quick testing, uncomment below and comment out the MySQL block above.
# spring.datasource.url=jdbc:h2:mem:jwt_token;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Drop and recreate the schema at each run to start with a clean database.
# CAUTION: This deletes all data on restart.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT configuration
jwt.secret=8fK9pL2mQ7xR4vT8wY1zA5cB3nD6eF0gH2jK9mPqRtUvWxYzAbCdEfGhJkLmNoP
jwt.expiration-ms=86400000

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# After Google login, redirect browser here with ?token= (React dev server by default)
app.oauth2.frontend-redirect-base=http://localhost:5173

# WebSocket Configuration
spring.websocket.enabled=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
server.tomcat.max-http-post-size=15728640
