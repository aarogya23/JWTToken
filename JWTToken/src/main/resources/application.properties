spring.application.name=JWTToken

server.port=8080

# DB (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/jwtDB?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
security.jwt.secret-key=your-very-long-secret-key-here-256-bits-minimum
security.jwt.expiration-time=86400000   # 24 hours in ms
