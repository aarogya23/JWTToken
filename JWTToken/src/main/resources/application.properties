spring.application.name=JWTToken

server.port=8080

# DB (MySQL local)
spring.datasource.url=jdbc:mysql://localhost:3306/jwt_token?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=jwtuser
# Password for the MySQL user; set it to the password you created in MySQL.
# Example: ALTER USER 'jwtuser'@'localhost' IDENTIFIED BY 'YourStrongPassword';
spring.datasource.password=YourStrongPassword
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# (Optional) H2 console is not needed for MySQL; remove or disable if not used
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# JWT configuration
jwt.secret=8fK9pL2mQ7xR4vT8wY1zA5cB3nD6eF0gH2jK9mPqRtUvWxYzAbCdEfGhJkLmNoP
jwt.expiration-ms=86400000

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# WebSocket Configuration
spring.websocket.enabled=true
